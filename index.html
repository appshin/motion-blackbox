<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Motion Blackbox</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #0a0a0f;
    --panel: rgba(0, 255, 65, 0.04);
    --border: rgba(0, 255, 65, 0.15);
    --green: #00ff41;
    --green-dim: rgba(0, 255, 65, 0.5);
    --green-glow: rgba(0, 255, 65, 0.3);
    --red: #ff2244;
    --red-glow: rgba(255, 34, 68, 0.4);
    --amber: #ffaa00;
    --text: #c0ffc8;
    --text-dim: rgba(0, 255, 65, 0.35);
    --font-mono: 'Share Tech Mono', monospace;
    --font-display: 'Orbitron', sans-serif;
  }

  body {
    background: var(--bg);
    color: var(--green);
    font-family: var(--font-mono);
    min-height: 100vh;
    overflow-x: hidden;
    position: relative;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,255,65,0.015) 2px,
      rgba(0,255,65,0.015) 4px
    );
    pointer-events: none;
    z-index: 9999;
  }

  .container {
    max-width: 480px;
    margin: 0 auto;
    padding: 12px;
    min-height: 100vh;
  }

  /* Header */
  .header {
    text-align: center;
    padding: 16px 0 12px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 12px;
  }

  .header h1 {
    font-family: var(--font-display);
    font-size: 1.3rem;
    font-weight: 900;
    letter-spacing: 4px;
    text-shadow: 0 0 20px var(--green-glow), 0 0 40px rgba(0,255,65,0.15);
    margin-bottom: 4px;
  }

  .header .subtitle {
    font-size: 0.65rem;
    color: var(--text-dim);
    letter-spacing: 3px;
    text-transform: uppercase;
  }

  /* Status Bar */
  .status-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 8px 12px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 4px;
    margin-bottom: 10px;
    font-size: 0.72rem;
  }

  .status-indicator {
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .status-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--green);
    box-shadow: 0 0 6px var(--green);
    animation: pulse-dot 2s ease-in-out infinite;
  }

  .status-dot.recording { background: var(--red); box-shadow: 0 0 8px var(--red); animation: pulse-dot-red 0.8s ease-in-out infinite; }
  .status-dot.idle { background: #555; box-shadow: none; animation: none; }

  @keyframes pulse-dot { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }
  @keyframes pulse-dot-red { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }

  /* Coordinate Display */
  .coord-panel {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 8px;
    margin-bottom: 10px;
  }

  .coord-box {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 10px 8px;
    text-align: center;
  }

  .coord-box .label {
    font-family: var(--font-display);
    font-size: 0.6rem;
    color: var(--text-dim);
    letter-spacing: 2px;
    margin-bottom: 4px;
  }

  .coord-box .value {
    font-size: 1.4rem;
    font-weight: bold;
    text-shadow: 0 0 10px var(--green-glow);
    transition: color 0.15s;
  }

  .coord-box .unit {
    font-size: 0.55rem;
    color: var(--text-dim);
    margin-top: 2px;
  }

  /* Canvas area */
  .graph-section {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 8px;
    margin-bottom: 10px;
  }

  .graph-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 6px;
    font-size: 0.6rem;
    color: var(--text-dim);
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  canvas {
    width: 100%;
    height: 130px;
    display: block;
    border-radius: 2px;
  }

  /* Impact Meter */
  .impact-section {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 10px 12px;
    margin-bottom: 10px;
  }

  .impact-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 8px;
  }

  .impact-header .label {
    font-size: 0.6rem;
    color: var(--text-dim);
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  .impact-value {
    font-family: var(--font-display);
    font-size: 1.1rem;
    text-shadow: 0 0 10px var(--green-glow);
  }

  .impact-bar-bg {
    height: 6px;
    background: rgba(0,255,65,0.08);
    border-radius: 3px;
    overflow: hidden;
    position: relative;
  }

  .impact-bar-fill {
    height: 100%;
    background: var(--green);
    border-radius: 3px;
    transition: width 0.1s, background 0.2s;
    box-shadow: 0 0 8px var(--green-glow);
  }

  .impact-bar-fill.warning { background: var(--amber); box-shadow: 0 0 8px rgba(255,170,0,0.4); }
  .impact-bar-fill.danger { background: var(--red); box-shadow: 0 0 8px var(--red-glow); }

  .threshold-line {
    position: absolute;
    top: -2px;
    bottom: -2px;
    width: 2px;
    background: var(--red);
    box-shadow: 0 0 4px var(--red);
  }

  /* Buffer info */
  .buffer-section {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-bottom: 10px;
  }

  .buffer-box {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 10px;
  }

  .buffer-box .label {
    font-size: 0.55rem;
    color: var(--text-dim);
    letter-spacing: 1.5px;
    text-transform: uppercase;
    margin-bottom: 4px;
  }

  .buffer-box .val {
    font-size: 1rem;
    text-shadow: 0 0 8px var(--green-glow);
  }

  .buffer-box .detail {
    font-size: 0.55rem;
    color: var(--text-dim);
    margin-top: 2px;
  }

  /* Saved events */
  .events-section {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 10px 12px;
    margin-bottom: 10px;
  }

  .events-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 8px;
  }

  .events-header .label {
    font-size: 0.6rem;
    color: var(--text-dim);
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  .event-count {
    font-family: var(--font-display);
    font-size: 0.8rem;
    color: var(--red);
    text-shadow: 0 0 8px var(--red-glow);
  }

  .event-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 6px 8px;
    background: rgba(255,34,68,0.05);
    border: 1px solid rgba(255,34,68,0.15);
    border-radius: 3px;
    margin-bottom: 4px;
    font-size: 0.65rem;
  }

  .event-item .time { color: var(--red); }
  .event-item .mag { color: var(--amber); }

  .event-item .download-btn {
    background: transparent;
    border: 1px solid rgba(255,34,68,0.3);
    color: var(--red);
    padding: 2px 8px;
    border-radius: 2px;
    font-family: var(--font-mono);
    font-size: 0.55rem;
    cursor: pointer;
    letter-spacing: 1px;
  }

  .event-item .download-btn:active {
    background: rgba(255,34,68,0.15);
  }

  .no-events {
    font-size: 0.6rem;
    color: var(--text-dim);
    text-align: center;
    padding: 12px;
  }

  /* Controls */
  .controls {
    display: flex;
    gap: 8px;
    margin-bottom: 10px;
  }

  .btn {
    flex: 1;
    padding: 12px;
    border: 1px solid var(--border);
    background: var(--panel);
    color: var(--green);
    font-family: var(--font-display);
    font-size: 0.65rem;
    letter-spacing: 2px;
    text-transform: uppercase;
    border-radius: 4px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .btn:active {
    background: rgba(0,255,65,0.12);
    box-shadow: 0 0 15px var(--green-glow);
  }

  .btn.danger {
    border-color: rgba(255,34,68,0.3);
    color: var(--red);
  }

  .btn.danger:active {
    background: rgba(255,34,68,0.12);
  }

  .btn:disabled {
    opacity: 0.3;
    cursor: not-allowed;
  }

  /* Threshold control */
  .threshold-control {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 10px 12px;
    margin-bottom: 10px;
  }

  .threshold-control .label {
    font-size: 0.55rem;
    color: var(--text-dim);
    letter-spacing: 1.5px;
    text-transform: uppercase;
    margin-bottom: 6px;
    display: flex;
    justify-content: space-between;
  }

  .threshold-control input[type="range"] {
    width: 100%;
    -webkit-appearance: none;
    appearance: none;
    height: 4px;
    background: rgba(0,255,65,0.15);
    border-radius: 2px;
    outline: none;
  }

  .threshold-control input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 16px;
    height: 16px;
    border-radius: 50%;
    background: var(--green);
    box-shadow: 0 0 8px var(--green-glow);
    cursor: pointer;
  }

  /* Impact flash */
  .impact-flash {
    position: fixed;
    inset: 0;
    background: radial-gradient(circle, rgba(255,34,68,0.3), transparent 70%);
    pointer-events: none;
    opacity: 0;
    z-index: 9998;
    transition: opacity 0.1s;
  }

  .impact-flash.active {
    opacity: 1;
    animation: flash-out 0.6s ease-out forwards;
  }

  @keyframes flash-out {
    0% { opacity: 1; }
    100% { opacity: 0; }
  }

  /* Log */
  .log-section {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 8px 10px;
    margin-bottom: 20px;
    max-height: 100px;
    overflow-y: auto;
  }

  .log-section .label {
    font-size: 0.55rem;
    color: var(--text-dim);
    letter-spacing: 1.5px;
    text-transform: uppercase;
    margin-bottom: 4px;
  }

  .log-line {
    font-size: 0.55rem;
    color: var(--text-dim);
    line-height: 1.6;
  }

  .log-line.impact { color: var(--red); }
  .log-line.save { color: var(--amber); }
</style>
</head>
<body>

<div class="impact-flash" id="impactFlash"></div>

<div class="container">
  <div class="header">
    <h1>MOTION BLACKBOX</h1>
    <div class="subtitle">Accelerometer Data Recorder</div>
  </div>

  <div class="status-bar">
    <div class="status-indicator">
      <div class="status-dot idle" id="statusDot"></div>
      <span id="statusText">대기 중</span>
    </div>
    <span id="clock">--:--:--</span>
  </div>

  <div class="coord-panel">
    <div class="coord-box">
      <div class="label">X축</div>
      <div class="value" id="xVal">0.00</div>
      <div class="unit">m/s²</div>
    </div>
    <div class="coord-box">
      <div class="label">Y축</div>
      <div class="value" id="yVal">0.00</div>
      <div class="unit">m/s²</div>
    </div>
    <div class="coord-box">
      <div class="label">Z축</div>
      <div class="value" id="zVal">0.00</div>
      <div class="unit">m/s²</div>
    </div>
  </div>

  <div class="graph-section">
    <div class="graph-header">
      <span>실시간 가속도 그래프</span>
      <span id="graphTime">0s</span>
    </div>
    <canvas id="graphCanvas" height="130"></canvas>
  </div>

  <div class="impact-section">
    <div class="impact-header">
      <span class="label">충격 감지</span>
      <span class="impact-value" id="impactVal">0.0 G</span>
    </div>
    <div class="impact-bar-bg">
      <div class="impact-bar-fill" id="impactBar" style="width:0%"></div>
      <div class="threshold-line" id="threshLine" style="left:40%"></div>
    </div>
  </div>

  <div class="threshold-control">
    <div class="label">
      <span>충격 감지 임계값</span>
      <span id="threshDisplay">2.0 G</span>
    </div>
    <input type="range" id="threshSlider" min="0.5" max="5" step="0.1" value="2.0">
  </div>

  <div class="buffer-section">
    <div class="buffer-box">
      <div class="label">버퍼 용량</div>
      <div class="val" id="bufferCount">0</div>
      <div class="detail" id="bufferTime">0초 / 180초</div>
    </div>
    <div class="buffer-box">
      <div class="label">저장된 이벤트</div>
      <div class="val" id="savedCount">0</div>
      <div class="detail">충격 감지 기록</div>
    </div>
  </div>

  <div class="controls">
    <button class="btn" id="startBtn" onclick="toggleRecording()">시작</button>
    <button class="btn danger" id="clearBtn" onclick="clearEvents()" disabled>기록 삭제</button>
  </div>

  <div class="events-section">
    <div class="events-header">
      <span class="label">충격 이벤트 기록</span>
      <span class="event-count" id="eventBadge">0</span>
    </div>
    <div id="eventList">
      <div class="no-events">충격 이벤트가 감지되면 여기에 표시됩니다</div>
    </div>
  </div>

  <div class="log-section">
    <div class="label">시스템 로그</div>
    <div id="logArea"></div>
  </div>
</div>

<script>
  // State
  let isRecording = false;
  let dataBuffer = [];          // rolling 3-minute buffer
  let savedEvents = [];         // saved impact events
  let impactThreshold = 2.0;    // in G
  const BUFFER_DURATION = 180;  // 3 minutes in seconds
  const SAMPLE_RATE = 20;       // samples per second (50ms interval)
  const MAX_BUFFER = BUFFER_DURATION * SAMPLE_RATE; // 3600 samples
  let lastImpactTime = 0;
  const IMPACT_COOLDOWN = 3000; // 3 sec cooldown between impacts

  // Graph data
  const GRAPH_POINTS = 200;
  let graphX = new Array(GRAPH_POINTS).fill(0);
  let graphY = new Array(GRAPH_POINTS).fill(0);
  let graphZ = new Array(GRAPH_POINTS).fill(0);

  // Current values
  let curX = 0, curY = 0, curZ = 0;

  // DOM refs
  const xValEl = document.getElementById('xVal');
  const yValEl = document.getElementById('yVal');
  const zValEl = document.getElementById('zVal');
  const statusDot = document.getElementById('statusDot');
  const statusText = document.getElementById('statusText');
  const clockEl = document.getElementById('clock');
  const impactValEl = document.getElementById('impactVal');
  const impactBar = document.getElementById('impactBar');
  const threshLine = document.getElementById('threshLine');
  const bufferCountEl = document.getElementById('bufferCount');
  const bufferTimeEl = document.getElementById('bufferTime');
  const savedCountEl = document.getElementById('savedCount');
  const eventListEl = document.getElementById('eventList');
  const eventBadgeEl = document.getElementById('eventBadge');
  const startBtn = document.getElementById('startBtn');
  const clearBtn = document.getElementById('clearBtn');
  const threshSlider = document.getElementById('threshSlider');
  const threshDisplay = document.getElementById('threshDisplay');
  const canvas = document.getElementById('graphCanvas');
  const ctx = canvas.getContext('2d');
  const impactFlash = document.getElementById('impactFlash');
  const logArea = document.getElementById('logArea');
  const graphTimeEl = document.getElementById('graphTime');

  // Clock
  function updateClock() {
    const now = new Date();
    clockEl.textContent = now.toTimeString().slice(0, 8);
  }
  setInterval(updateClock, 1000);
  updateClock();

  // Log
  function addLog(msg, type = '') {
    const time = new Date().toTimeString().slice(0, 8);
    const line = document.createElement('div');
    line.className = 'log-line' + (type ? ' ' + type : '');
    line.textContent = `[${time}] ${msg}`;
    logArea.prepend(line);
    if (logArea.children.length > 30) logArea.removeChild(logArea.lastChild);
  }

  // Threshold slider
  threshSlider.addEventListener('input', (e) => {
    impactThreshold = parseFloat(e.target.value);
    threshDisplay.textContent = impactThreshold.toFixed(1) + ' G';
    threshLine.style.left = (impactThreshold / 5 * 100) + '%';
  });
  threshLine.style.left = (impactThreshold / 5 * 100) + '%';

  // Motion handling
  function handleMotion(event) {
    if (!isRecording) return;

    const acc = event.accelerationIncludingGravity || event.acceleration;
    if (!acc) return;

    curX = acc.x || 0;
    curY = acc.y || 0;
    curZ = acc.z || 0;
  }

  // Sampling loop
  let sampleInterval = null;

  function startSampling() {
    sampleInterval = setInterval(() => {
      if (!isRecording) return;

      const timestamp = Date.now();
      const gForce = Math.sqrt(curX*curX + curY*curY + curZ*curZ) / 9.81;

      // Update display
      xValEl.textContent = curX.toFixed(2);
      yValEl.textContent = curY.toFixed(2);
      zValEl.textContent = curZ.toFixed(2);

      // Update graph arrays
      graphX.push(curX); graphX.shift();
      graphY.push(curY); graphY.shift();
      graphZ.push(curZ); graphZ.shift();

      // Add to buffer
      dataBuffer.push({
        t: timestamp,
        x: parseFloat(curX.toFixed(3)),
        y: parseFloat(curY.toFixed(3)),
        z: parseFloat(curZ.toFixed(3)),
        g: parseFloat(gForce.toFixed(3))
      });

      // Trim buffer to 3 minutes
      while (dataBuffer.length > MAX_BUFFER) {
        dataBuffer.shift();
      }

      // Update impact display
      const displayG = gForce.toFixed(1);
      impactValEl.textContent = displayG + ' G';
      const pct = Math.min(gForce / 5 * 100, 100);
      impactBar.style.width = pct + '%';

      if (gForce > impactThreshold) {
        impactBar.className = 'impact-bar-fill danger';
      } else if (gForce > impactThreshold * 0.6) {
        impactBar.className = 'impact-bar-fill warning';
      } else {
        impactBar.className = 'impact-bar-fill';
      }

      // Impact detection
      // Subtract gravity (~1G at rest), check if residual exceeds threshold
      const netG = Math.abs(gForce - 1.0);
      if (netG > impactThreshold && (timestamp - lastImpactTime) > IMPACT_COOLDOWN) {
        lastImpactTime = timestamp;
        triggerImpact(netG, timestamp);
      }

      // Update buffer info
      bufferCountEl.textContent = dataBuffer.length;
      const bufSec = Math.floor(dataBuffer.length / SAMPLE_RATE);
      bufferTimeEl.textContent = bufSec + '초 / ' + BUFFER_DURATION + '초';
      graphTimeEl.textContent = Math.floor(GRAPH_POINTS / SAMPLE_RATE) + 's';

    }, 1000 / SAMPLE_RATE);
  }

  // Impact triggered
  function triggerImpact(gForce, timestamp) {
    // Flash screen
    impactFlash.classList.remove('active');
    void impactFlash.offsetWidth;
    impactFlash.classList.add('active');

    // Vibrate if available
    if (navigator.vibrate) navigator.vibrate([200, 100, 200]);

    // Save buffer snapshot
    const snapshot = [...dataBuffer];
    const eventTime = new Date(timestamp);
    const eventData = {
      id: Date.now(),
      time: eventTime.toLocaleString('ko-KR'),
      timeShort: eventTime.toTimeString().slice(0, 8),
      magnitude: gForce.toFixed(2),
      dataPoints: snapshot.length,
      duration: Math.floor(snapshot.length / SAMPLE_RATE),
      data: snapshot
    };

    savedEvents.unshift(eventData);
    savedCountEl.textContent = savedEvents.length;
    eventBadgeEl.textContent = savedEvents.length;
    clearBtn.disabled = false;

    addLog(`충격 감지! ${gForce.toFixed(2)}G — ${snapshot.length}개 데이터 저장됨`, 'impact');

    // Change status briefly
    statusDot.className = 'status-dot recording';
    statusText.textContent = '충격 감지!';
    setTimeout(() => {
      if (isRecording) {
        statusDot.className = 'status-dot';
        statusText.textContent = '기록 중';
      }
    }, 2000);

    renderEvents();
  }

  // Render events list
  function renderEvents() {
    if (savedEvents.length === 0) {
      eventListEl.innerHTML = '<div class="no-events">충격 이벤트가 감지되면 여기에 표시됩니다</div>';
      return;
    }

    eventListEl.innerHTML = savedEvents.map((ev, i) => `
      <div class="event-item">
        <span class="time">${ev.timeShort}</span>
        <span class="mag">${ev.magnitude}G</span>
        <span>${ev.dataPoints}pts / ${ev.duration}s</span>
        <button class="download-btn" onclick="downloadEvent(${i})">저장</button>
      </div>
    `).join('');
  }

  // Download event as JSON
  function downloadEvent(index) {
    const ev = savedEvents[index];
    const exportData = {
      event_time: ev.time,
      impact_magnitude_g: parseFloat(ev.magnitude),
      buffer_duration_sec: ev.duration,
      sample_rate_hz: SAMPLE_RATE,
      data_points: ev.dataPoints,
      samples: ev.data.map(d => ({
        timestamp: d.t,
        x: d.x,
        y: d.y,
        z: d.z,
        total_g: d.g
      }))
    };

    const blob = new Blob([JSON.stringify(exportData, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `impact_${ev.id}.json`;
    a.click();
    URL.revokeObjectURL(url);

    addLog(`이벤트 ${ev.timeShort} 데이터 다운로드`, 'save');
  }

  // Clear events
  function clearEvents() {
    if (confirm('모든 충격 기록을 삭제하시겠습니까?')) {
      savedEvents = [];
      savedCountEl.textContent = '0';
      eventBadgeEl.textContent = '0';
      clearBtn.disabled = true;
      renderEvents();
      addLog('모든 이벤트 기록이 삭제되었습니다');
    }
  }

  // Draw graph
  function drawGraph() {
    const dpr = window.devicePixelRatio || 1;
    const rect = canvas.getBoundingClientRect();
    canvas.width = rect.width * dpr;
    canvas.height = rect.height * dpr;
    ctx.scale(dpr, dpr);
    const W = rect.width;
    const H = rect.height;

    ctx.clearRect(0, 0, W, H);

    // Grid
    ctx.strokeStyle = 'rgba(0,255,65,0.06)';
    ctx.lineWidth = 0.5;
    for (let y = 0; y < H; y += H/6) {
      ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
    }
    for (let x = 0; x < W; x += W/10) {
      ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
    }

    // Center line
    ctx.strokeStyle = 'rgba(0,255,65,0.15)';
    ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(0, H/2); ctx.lineTo(W, H/2); ctx.stroke();

    // Scale: map -20 to 20 m/s² to canvas height
    const mapY = (val) => H/2 - (val / 20) * (H/2);

    function drawLine(data, color, alpha) {
      ctx.strokeStyle = color;
      ctx.lineWidth = 1.5;
      ctx.globalAlpha = alpha;
      ctx.beginPath();
      for (let i = 0; i < data.length; i++) {
        const px = (i / (data.length - 1)) * W;
        const py = mapY(data[i]);
        if (i === 0) ctx.moveTo(px, py);
        else ctx.lineTo(px, py);
      }
      ctx.stroke();
      ctx.globalAlpha = 1;
    }

    drawLine(graphX, '#ff4466', 0.7);  // X = red
    drawLine(graphY, '#44ff66', 0.7);  // Y = green
    drawLine(graphZ, '#4488ff', 0.7);  // Z = blue

    // Legend
    ctx.font = '10px Share Tech Mono';
    const labels = [
      { text: 'X', color: '#ff4466', x: W - 70 },
      { text: 'Y', color: '#44ff66', x: W - 46 },
      { text: 'Z', color: '#4488ff', x: W - 22 }
    ];
    labels.forEach(l => {
      ctx.fillStyle = l.color;
      ctx.fillRect(l.x, 6, 8, 8);
      ctx.fillStyle = 'rgba(0,255,65,0.5)';
      ctx.fillText(l.text, l.x + 11, 14);
    });

    requestAnimationFrame(drawGraph);
  }

  // Toggle recording
  async function toggleRecording() {
    if (!isRecording) {
      // Request permission on iOS
      if (typeof DeviceMotionEvent !== 'undefined' && typeof DeviceMotionEvent.requestPermission === 'function') {
        try {
          const perm = await DeviceMotionEvent.requestPermission();
          if (perm !== 'granted') {
            addLog('모션 센서 권한이 거부되었습니다');
            return;
          }
        } catch (e) {
          addLog('모션 센서 권한 요청 실패: ' + e.message);
          return;
        }
      }

      isRecording = true;
      dataBuffer = [];
      window.addEventListener('devicemotion', handleMotion);
      startSampling();

      statusDot.className = 'status-dot';
      statusText.textContent = '기록 중';
      startBtn.textContent = '정지';
      startBtn.classList.add('danger');

      addLog('모션 기록 시작 — 3분 롤링 버퍼 활성화');

    } else {
      isRecording = false;
      window.removeEventListener('devicemotion', handleMotion);
      if (sampleInterval) { clearInterval(sampleInterval); sampleInterval = null; }

      statusDot.className = 'status-dot idle';
      statusText.textContent = '정지됨';
      startBtn.textContent = '시작';
      startBtn.classList.remove('danger');

      addLog('모션 기록 정지');
    }
  }

  // Simulate motion for desktop testing
  let isDesktop = false;
  function checkDesktop() {
    if (!('DeviceMotionEvent' in window) || (navigator.userAgent.includes('Windows') || navigator.userAgent.includes('Macintosh'))) {
      isDesktop = true;
      addLog('데스크톱 감지 — 시뮬레이션 모드 활성화');

      // Simulate gentle motion with occasional impacts
      let simTime = 0;
      const originalHandleMotion = handleMotion;

      setInterval(() => {
        if (!isRecording) return;
        simTime += 0.05;

        // Base gentle motion
        let sx = Math.sin(simTime * 1.3) * 0.5 + (Math.random() - 0.5) * 0.3;
        let sy = Math.cos(simTime * 0.9) * 0.4 + (Math.random() - 0.5) * 0.2;
        let sz = 9.81 + Math.sin(simTime * 0.7) * 0.3 + (Math.random() - 0.5) * 0.2;

        curX = sx;
        curY = sy;
        curZ = sz;
      }, 50);
    }
  }

  // Init
  checkDesktop();
  drawGraph();
  addLog('시스템 초기화 완료');
  addLog('시작 버튼을 눌러 기록을 시작하세요');

  // Handle window resize for canvas
  window.addEventListener('resize', () => {
    // Canvas auto-adjusts in drawGraph via getBoundingClientRect
  });
</script>

<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Motion Blackbox</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap');
  *{margin:0;padding:0;box-sizing:border-box}
  :root{
    --bg:#f0f2f5;--panel:#fff;--border:#d0d5dd;
    --primary:#1a73e8;--primary-light:rgba(26,115,232,.08);--primary-glow:rgba(26,115,232,.25);
    --red:#d93025;--red-light:rgba(217,48,37,.08);--red-glow:rgba(217,48,37,.3);
    --amber:#e8710a;
    --brake:#7b1fa2;--brake-light:rgba(123,31,162,.08);--brake-glow:rgba(123,31,162,.35);
    --text:#1a1a2e;--text-sec:#5f6368;--text-dim:#9aa0a6;
    --shadow:0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.06);
    --font-mono:'Share Tech Mono',monospace;--font-display:'Orbitron',sans-serif;
  }
  body{background:var(--bg);color:var(--text);font-family:var(--font-mono);min-height:100vh;overflow-x:hidden}
  .container{max-width:480px;margin:0 auto;padding:12px}

  .header{text-align:center;padding:16px 0 12px;margin-bottom:10px}
  .header h1{font-family:var(--font-display);font-size:1.2rem;font-weight:900;letter-spacing:4px;margin-bottom:3px}
  .header .subtitle{font-size:.6rem;color:var(--text-dim);letter-spacing:3px;text-transform:uppercase}

  .banner{display:none;color:#fff;text-align:center;padding:12px;border-radius:10px;margin-bottom:10px;font-family:var(--font-display);font-size:.7rem;letter-spacing:2px}
  .banner .banner-sub{font-family:var(--font-mono);font-size:.58rem;letter-spacing:1px;margin-top:3px;opacity:.9}
  .banner.visible{display:block}
  .impact-banner{background:var(--red);box-shadow:0 4px 12px var(--red-glow)}

  .status-bar{display:flex;justify-content:space-between;align-items:center;padding:8px 12px;background:var(--panel);border:1px solid var(--border);border-radius:10px;margin-bottom:10px;font-size:.72rem;box-shadow:var(--shadow);color:var(--text-sec)}
  .status-indicator{display:flex;align-items:center;gap:7px;font-weight:bold}
  .status-dot{width:9px;height:9px;border-radius:50%}
  .status-dot.active{background:var(--primary);box-shadow:0 0 6px var(--primary-glow);animation:pd 2s ease-in-out infinite}
  .status-dot.idle{background:#bbb}
  .status-dot.stopped{background:var(--red)}
  .status-dot.brake{background:var(--brake);box-shadow:0 0 6px var(--brake-glow);animation:pd .8s ease-in-out infinite}
  @keyframes pd{0%,100%{opacity:1}50%{opacity:.4}}

  /* Pedal + Y value row */
  .pedal-row{display:flex;gap:10px;margin-bottom:10px;align-items:stretch}

  .pedal-section{
    width:140px;min-width:140px;
    background:var(--panel);border:1px solid var(--border);border-radius:10px;
    padding:10px;box-shadow:var(--shadow);display:flex;flex-direction:column;align-items:center;
    transition:border-color .3s,background .3s;
  }
  .pedal-section.braking{border-color:var(--brake);background:var(--brake-light)}
  .pedal-section .pedal-label{font-size:.55rem;color:var(--text-dim);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:4px;font-weight:bold}
  .pedal-section.braking .pedal-label{color:var(--brake)}

  .y-display{
    flex:1;background:var(--panel);border:1px solid var(--border);border-radius:10px;
    padding:14px;text-align:center;box-shadow:var(--shadow);
    display:flex;flex-direction:column;justify-content:center;
    transition:border-color .3s,background .3s;
  }
  .y-display.braking{border-color:var(--brake);background:var(--brake-light)}
  .y-display .label{font-family:var(--font-display);font-size:.65rem;color:var(--primary);letter-spacing:3px;margin-bottom:4px}
  .y-display.braking .label{color:var(--brake)}
  .y-display .value{font-size:2.6rem;font-weight:bold;color:var(--text);line-height:1}
  .y-display .unit{font-size:.6rem;color:var(--text-dim);margin-top:3px}
  .y-display .brake-tag{display:none;margin-top:6px;font-family:var(--font-display);font-size:.65rem;color:var(--brake);letter-spacing:2px;font-weight:700}
  .y-display.braking .brake-tag{display:block;animation:blink .6s ease-in-out infinite}
  @keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}

  /* Graphs */
  .graph-section{background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:10px;margin-bottom:10px;box-shadow:var(--shadow)}
  .graph-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px;font-size:.6rem;color:var(--text-sec);letter-spacing:1px;text-transform:uppercase;font-weight:bold}
  canvas#graphCanvas{width:100%;height:130px;display:block;border-radius:6px;background:#fafbfc;border:1px solid #e8eaed}

  .frozen-graph-section{display:none;background:var(--panel);border:2px solid var(--red);border-radius:10px;padding:10px;margin-bottom:10px;box-shadow:0 4px 12px var(--red-glow)}
  .frozen-graph-section.visible{display:block}
  .frozen-graph-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px;font-size:.6rem;color:var(--red);letter-spacing:1px;text-transform:uppercase;font-weight:bold}
  canvas#frozenCanvas{width:100%;height:180px;display:block;border-radius:6px;background:#fffafa;border:1px solid rgba(217,48,37,.15)}

  .impact-section{background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:10px 12px;margin-bottom:10px;box-shadow:var(--shadow)}
  .impact-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
  .impact-header .label{font-size:.6rem;color:var(--text-sec);letter-spacing:2px;text-transform:uppercase;font-weight:bold}
  .impact-value{font-family:var(--font-display);font-size:1.1rem}
  .impact-bar-bg{height:7px;background:#e8eaed;border-radius:4px;overflow:hidden;position:relative}
  .impact-bar-fill{height:100%;background:var(--primary);border-radius:4px;transition:width .1s,background .2s}
  .impact-bar-fill.warning{background:var(--amber)}
  .impact-bar-fill.danger{background:var(--red)}
  .threshold-line{position:absolute;top:-3px;bottom:-3px;width:2px;background:var(--red);border-radius:1px}

  .threshold-control{background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:10px 12px;margin-bottom:10px;box-shadow:var(--shadow)}
  .threshold-control .label{font-size:.55rem;color:var(--text-sec);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:6px;display:flex;justify-content:space-between;font-weight:bold}
  .threshold-control input[type="range"]{width:100%;-webkit-appearance:none;height:5px;background:#e8eaed;border-radius:3px;outline:none}
  .threshold-control input[type="range"]::-webkit-slider-thumb{-webkit-appearance:none;width:18px;height:18px;border-radius:50%;background:var(--primary);box-shadow:0 2px 6px var(--primary-glow);cursor:pointer}

  .buffer-section{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
  .buffer-box{background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:10px;box-shadow:var(--shadow)}
  .buffer-box .label{font-size:.55rem;color:var(--text-dim);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:3px;font-weight:bold}
  .buffer-box .val{font-size:1rem;font-weight:bold}
  .buffer-box .detail{font-size:.5rem;color:var(--text-dim);margin-top:2px}

  .controls{display:flex;gap:8px;margin-bottom:10px}
  .btn{flex:1;padding:13px;border:none;background:var(--primary);color:#fff;font-family:var(--font-display);font-size:.65rem;letter-spacing:2px;text-transform:uppercase;border-radius:10px;cursor:pointer;box-shadow:var(--shadow);font-weight:700}
  .btn:active{transform:scale(.97)}
  .btn.stop-btn{background:var(--red)}
  .btn.secondary{background:var(--panel);color:var(--text-sec);border:1px solid var(--border)}
  .btn:disabled{opacity:.35;cursor:not-allowed}

  .events-section{background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:10px 12px;margin-bottom:10px;box-shadow:var(--shadow)}
  .events-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
  .events-header .label{font-size:.6rem;color:var(--text-sec);letter-spacing:2px;text-transform:uppercase;font-weight:bold}
  .event-count{font-family:var(--font-display);font-size:.75rem;color:var(--red);background:var(--red-light);padding:2px 10px;border-radius:12px;font-weight:700}
  .event-item{display:flex;justify-content:space-between;align-items:center;padding:7px 9px;background:var(--red-light);border:1px solid rgba(217,48,37,.15);border-radius:8px;margin-bottom:5px;font-size:.65rem}
  .event-item .time{color:var(--red);font-weight:bold}
  .event-item .mag{color:var(--amber);font-weight:bold}
  .event-item .download-btn{background:var(--red);border:none;color:#fff;padding:3px 10px;border-radius:6px;font-family:var(--font-mono);font-size:.55rem;cursor:pointer;font-weight:bold}
  .no-events{font-size:.6rem;color:var(--text-dim);text-align:center;padding:14px}

  .impact-flash{position:fixed;inset:0;background:radial-gradient(circle,rgba(217,48,37,.25),transparent 70%);pointer-events:none;opacity:0;z-index:9998}
  .impact-flash.active{opacity:1;animation:fo .8s ease-out forwards}
  @keyframes fo{0%{opacity:1}100%{opacity:0}}

  .log-section{background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:8px 10px;margin-bottom:20px;max-height:90px;overflow-y:auto;box-shadow:var(--shadow)}
  .log-section .label{font-size:.55rem;color:var(--text-dim);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:3px;font-weight:bold}
  .log-line{font-size:.55rem;color:var(--text-sec);line-height:1.7}
  .log-line.impact{color:var(--red);font-weight:bold}
  .log-line.save{color:var(--amber);font-weight:bold}
  .log-line.brake{color:var(--brake);font-weight:bold}
</style>
</head>
<body>
<div class="impact-flash" id="impactFlash"></div>
<div class="container">
  <div class="header">
    <h1>MOTION BLACKBOX</h1>
    <div class="subtitle">Y-Axis Brake Monitor</div>
  </div>

  <div class="banner impact-banner" id="impactBanner">
    ⚠ 충격 감지 — 기록 자동 정지
    <div class="banner-sub" id="impactBannerSub"></div>
  </div>

  <div class="status-bar">
    <div class="status-indicator">
      <div class="status-dot idle" id="statusDot"></div>
      <span id="statusText">대기 중</span>
    </div>
    <span id="clock">--:--:--</span>
  </div>

  <!-- Pedal + Y value -->
  <div class="pedal-row">
    <div class="pedal-section" id="pedalSection">
      <div class="pedal-label">브레이크 페달</div>
      <svg id="pedalSvg" viewBox="0 0 120 200" width="120" height="170">
        <!-- Mounting bracket -->
        <rect x="45" y="2" width="30" height="10" rx="3" fill="#888" stroke="#666" stroke-width="1"/>
        <rect x="57" y="10" width="6" height="15" fill="#777" stroke="#666" stroke-width="0.5"/>

        <!-- Pivot point -->
        <circle cx="60" cy="28" r="5" fill="#999" stroke="#666" stroke-width="1"/>

        <!-- Pedal arm (rotates around pivot) -->
        <g id="pedalArm" style="transform-origin:60px 28px;transition:transform .15s ease-out">
          <!-- Arm -->
          <rect x="56" y="28" width="8" height="100" rx="3" fill="#b0b0b0" stroke="#888" stroke-width="1"/>
          <!-- Spring coil visual -->
          <path d="M52,45 Q48,50 52,55 Q56,60 52,65 Q48,70 52,75" fill="none" stroke="#e8710a" stroke-width="2" stroke-linecap="round"/>
          <!-- Pedal pad -->
          <rect x="40" y="125" width="40" height="18" rx="5" fill="#444" stroke="#333" stroke-width="1.5" id="pedalPad"/>
          <rect x="44" y="128" width="32" height="12" rx="3" fill="#555"/>
          <!-- Grip lines on pedal -->
          <line x1="48" y1="131" x2="48" y2="137" stroke="#666" stroke-width="1"/>
          <line x1="53" y1="131" x2="53" y2="137" stroke="#666" stroke-width="1"/>
          <line x1="58" y1="131" x2="58" y2="137" stroke="#666" stroke-width="1"/>
          <line x1="63" y1="131" x2="63" y2="137" stroke="#666" stroke-width="1"/>
          <line x1="68" y1="131" x2="68" y2="137" stroke="#666" stroke-width="1"/>
        </g>

        <!-- Floor -->
        <rect x="10" y="175" width="100" height="6" rx="2" fill="#ddd" stroke="#bbb" stroke-width="1"/>

        <!-- Brake light indicator -->
        <circle cx="60" cy="192" r="6" fill="#eee" stroke="#ccc" stroke-width="1" id="brakeLightBg"/>
        <circle cx="60" cy="192" r="4" fill="#ddd" id="brakeLight"/>
      </svg>
    </div>

    <div class="y-display" id="yDisplay">
      <div class="label">Y축 가속도</div>
      <div class="value" id="yVal">0.00</div>
      <div class="unit">m/s²</div>
      <div class="brake-tag" id="brakeTag">🛑 브레이크 작동</div>
    </div>
  </div>

  <!-- Frozen graph -->
  <div class="frozen-graph-section" id="frozenGraphSection">
    <div class="frozen-graph-header">
      <span>📊 충격 전 1분 그래프</span>
      <span id="frozenGraphTime">60초</span>
    </div>
    <canvas id="frozenCanvas" height="180"></canvas>
  </div>

  <!-- Live graph -->
  <div class="graph-section">
    <div class="graph-header">
      <span>실시간 Y축 그래프</span>
      <span id="graphTime">10s</span>
    </div>
    <canvas id="graphCanvas" height="130"></canvas>
  </div>

  <div class="impact-section">
    <div class="impact-header">
      <span class="label">충격 강도</span>
      <span class="impact-value" id="impactVal">0.0 G</span>
    </div>
    <div class="impact-bar-bg">
      <div class="impact-bar-fill" id="impactBar" style="width:0%"></div>
      <div class="threshold-line" id="threshLine" style="left:40%"></div>
    </div>
  </div>

  <div class="threshold-control">
    <div class="label"><span>충격 임계값</span><span id="threshDisplay">2.0 G</span></div>
    <input type="range" id="threshSlider" min="0.5" max="5" step="0.1" value="2.0">
  </div>

  <div class="buffer-section">
    <div class="buffer-box"><div class="label">버퍼</div><div class="val" id="bufferCount">0</div><div class="detail" id="bufferTime">0초 / 180초</div></div>
    <div class="buffer-box"><div class="label">이벤트</div><div class="val" id="savedCount">0</div><div class="detail">충격 기록</div></div>
  </div>

  <div class="controls">
    <button class="btn" id="startBtn" onclick="toggleRecording()">시작</button>
    <button class="btn secondary" id="clearBtn" onclick="clearEvents()" disabled>기록 삭제</button>
  </div>

  <div class="events-section">
    <div class="events-header">
      <span class="label">충격 이벤트</span>
      <span class="event-count" id="eventBadge">0</span>
    </div>
    <div id="eventList"><div class="no-events">충격 이벤트가 감지되면 여기에 표시됩니다</div></div>
  </div>

  <div class="log-section">
    <div class="label">로그</div>
    <div id="logArea"></div>
  </div>
</div>

<script>
let isRecording=false,dataBuffer=[],savedEvents=[],impactThreshold=2.0;
const BUFFER_DURATION=180,SAMPLE_RATE=20,MAX_BUFFER=BUFFER_DURATION*SAMPLE_RATE;
const FROZEN_SAMPLES=60*SAMPLE_RATE;
let lastImpactTime=0;const IMPACT_COOLDOWN=3000;
const GRAPH_POINTS=200;
let graphY=new Array(GRAPH_POINTS).fill(0);
let curY=0,curX=0,curZ=0;
let animFrameId=null,sampleInterval=null;
let prevY=0,brakeActive=false,brakeTimeout=null;
const BRAKE_THRESHOLD=-3;

const $=id=>document.getElementById(id);
const pedalArm=$('pedalArm');
const brakeLight=$('brakeLight');
const brakeLightBg=$('brakeLightBg');

function updateClock(){$('clock').textContent=new Date().toTimeString().slice(0,8)}
setInterval(updateClock,1000);updateClock();

function addLog(msg,type=''){
  const t=new Date().toTimeString().slice(0,8);
  const l=document.createElement('div');
  l.className='log-line'+(type?' '+type:'');
  l.textContent=`[${t}] ${msg}`;
  $('logArea').prepend(l);
  if($('logArea').children.length>30)$('logArea').removeChild($('logArea').lastChild);
}

$('threshSlider').addEventListener('input',e=>{
  impactThreshold=parseFloat(e.target.value);
  $('threshDisplay').textContent=impactThreshold.toFixed(1)+' G';
  $('threshLine').style.left=(impactThreshold/5*100)+'%';
});
$('threshLine').style.left=(impactThreshold/5*100)+'%';

function handleMotion(e){
  if(!isRecording)return;
  const a=e.accelerationIncludingGravity||e.acceleration;
  if(!a)return;
  curX=a.x||0;curY=a.y||0;curZ=a.z||0;
}

// Pedal animation: Y감소 → 페달 내려감 (회전), Y증가 → 페달 올라감
function updatePedal(yValue){
  // Map Y value to pedal angle
  // Y=0 (중립) → 0도, Y=-10 (강한 브레이크) → 25도, Y=+10 → -5도 (살짝 위로)
  // Clamp between -5 and 30 degrees
  let angle = -yValue * 2.5; // Y 감소 → 양의 각도 (페달 내려감)
  angle = Math.max(-5, Math.min(30, angle));

  pedalArm.style.transform = `rotate(${angle}deg)`;

  // Brake light
  const isBraking = yValue < BRAKE_THRESHOLD || (curY - prevY) < -2;
  const pressIntensity = Math.min(1, Math.max(0, (-yValue - 1) / 8));

  if(isBraking || pressIntensity > 0.2){
    // Red glow proportional to press
    const r = Math.round(220 + 35 * pressIntensity);
    const g = Math.round(40 * (1 - pressIntensity));
    const b = Math.round(40 * (1 - pressIntensity));
    brakeLight.setAttribute('fill', `rgb(${r},${g},${b})`);
    brakeLight.setAttribute('r', 4 + pressIntensity * 2);
    brakeLightBg.setAttribute('stroke', `rgba(220,30,30,${0.3 + pressIntensity * 0.5})`);
  } else {
    brakeLight.setAttribute('fill', '#ddd');
    brakeLight.setAttribute('r', 4);
    brakeLightBg.setAttribute('stroke', '#ccc');
  }
}

function startSampling(){
  sampleInterval=setInterval(()=>{
    if(!isRecording)return;
    const ts=Date.now();
    const gF=Math.sqrt(curX*curX+curY*curY+curZ*curZ)/9.81;

    $('yVal').textContent=curY.toFixed(2);
    graphY.push(curY);graphY.shift();
    dataBuffer.push({t:ts,y:+curY.toFixed(3),g:+gF.toFixed(3)});
    while(dataBuffer.length>MAX_BUFFER)dataBuffer.shift();

    // Update pedal visual
    updatePedal(curY);

    // Brake detection
    const yDelta=curY-prevY;
    if(curY<BRAKE_THRESHOLD || yDelta<-2){
      if(!brakeActive){
        brakeActive=true;
        $('yDisplay').classList.add('braking');
        $('pedalSection').classList.add('braking');
        $('statusDot').className='status-dot brake';
        addLog(`브레이크 감지 Y=${curY.toFixed(2)}`,'brake');
      }
      if(brakeTimeout)clearTimeout(brakeTimeout);
      brakeTimeout=setTimeout(()=>{
        brakeActive=false;
        $('yDisplay').classList.remove('braking');
        $('pedalSection').classList.remove('braking');
        if(isRecording)$('statusDot').className='status-dot active';
      },1500);
    }
    prevY=curY;

    $('impactVal').textContent=gF.toFixed(1)+' G';
    const pct=Math.min(gF/5*100,100);
    $('impactBar').style.width=pct+'%';
    $('impactBar').className='impact-bar-fill'+(gF>impactThreshold?' danger':gF>impactThreshold*.6?' warning':'');

    const netG=Math.abs(gF-1.0);
    if(netG>impactThreshold&&(ts-lastImpactTime)>IMPACT_COOLDOWN){
      lastImpactTime=ts;triggerImpact(netG,ts);
    }

    $('bufferCount').textContent=dataBuffer.length;
    $('bufferTime').textContent=Math.floor(dataBuffer.length/SAMPLE_RATE)+'초 / '+BUFFER_DURATION+'초';
    $('graphTime').textContent=Math.floor(GRAPH_POINTS/SAMPLE_RATE)+'s';
  },1000/SAMPLE_RATE);
}

function triggerImpact(gForce,timestamp){
  $('impactFlash').classList.remove('active');
  void $('impactFlash').offsetWidth;
  $('impactFlash').classList.add('active');
  if(navigator.vibrate)navigator.vibrate([200,100,200]);

  const snapshot=[...dataBuffer];
  const evTime=new Date(timestamp);
  const ev={id:Date.now(),time:evTime.toLocaleString('ko-KR'),
    timeShort:evTime.toTimeString().slice(0,8),magnitude:gForce.toFixed(2),
    dataPoints:snapshot.length,duration:Math.floor(snapshot.length/SAMPLE_RATE),data:snapshot};
  savedEvents.unshift(ev);
  $('savedCount').textContent=savedEvents.length;
  $('eventBadge').textContent=savedEvents.length;
  $('clearBtn').disabled=false;
  addLog(`⚠ 충격! ${gForce.toFixed(2)}G — 자동 정지`,'impact');
  addLog(`${snapshot.length}개 데이터 저장`,'save');

  stopRecording();
  brakeActive=false;
  $('yDisplay').classList.remove('braking');
  $('pedalSection').classList.remove('braking');

  $('impactBanner').classList.add('visible');
  $('impactBannerSub').textContent=`${gForce.toFixed(2)}G | ${ev.timeShort} | ${snapshot.length}개`;
  $('statusDot').className='status-dot stopped';
  $('statusText').textContent='충격 — 정지됨';
  $('startBtn').textContent='재시작';$('startBtn').classList.remove('stop-btn');

  showFrozenGraph(snapshot);renderEvents();
}

function showFrozenGraph(snapshot){
  const last=snapshot.slice(-FROZEN_SAMPLES);
  $('frozenGraphSection').classList.add('visible');
  const c=$('frozenCanvas'),cx=c.getContext('2d');
  const dpr=window.devicePixelRatio||1,rect=c.getBoundingClientRect();
  c.width=rect.width*dpr;c.height=rect.height*dpr;cx.scale(dpr,dpr);
  const W=rect.width,H=rect.height;cx.clearRect(0,0,W,H);

  cx.strokeStyle='#e8eaed';cx.lineWidth=.5;
  for(let y=0;y<=H;y+=H/6){cx.beginPath();cx.moveTo(0,y);cx.lineTo(W,y);cx.stroke()}
  for(let x=0;x<=W;x+=W/12){cx.beginPath();cx.moveTo(x,0);cx.lineTo(x,H);cx.stroke()}

  cx.fillStyle='#5f6368';cx.font='10px Share Tech Mono';
  const totalSec=last.length/SAMPLE_RATE;
  for(let s=0;s<=totalSec;s+=10){cx.fillText(`-${Math.round(totalSec-s)}s`,(s/totalSec)*W+2,H-4)}

  cx.strokeStyle='#d0d5dd';cx.lineWidth=1;
  cx.beginPath();cx.moveTo(0,H/2);cx.lineTo(W,H/2);cx.stroke();
  cx.fillStyle='#5f6368';cx.fillText('+20',2,14);cx.fillText('0',2,H/2-4);cx.fillText('-20',2,H-16);

  const mapV=v=>H/2-(v/20)*(H/2*.85);

  // Brake zone
  cx.fillStyle='rgba(123,31,162,0.06)';
  const bY=mapV(BRAKE_THRESHOLD);cx.fillRect(0,bY,W,H-bY);
  cx.strokeStyle='rgba(123,31,162,.3)';cx.lineWidth=1;cx.setLineDash([4,4]);
  cx.beginPath();cx.moveTo(0,bY);cx.lineTo(W,bY);cx.stroke();cx.setLineDash([]);
  cx.fillStyle='#7b1fa2';cx.font='10px Share Tech Mono';cx.fillText('브레이크 구간',W-90,bY+14);

  if(last.length>=2){
    cx.strokeStyle='#1a73e8';cx.lineWidth=2.5;cx.beginPath();
    for(let i=0;i<last.length;i++){
      const px=(i/(last.length-1))*W,py=mapV(last[i].y);
      i===0?cx.moveTo(px,py):cx.lineTo(px,py);
    }
    cx.stroke();
  }

  cx.strokeStyle='rgba(217,48,37,.7)';cx.lineWidth=2;cx.setLineDash([5,3]);
  cx.beginPath();cx.moveTo(W-2,0);cx.lineTo(W-2,H);cx.stroke();cx.setLineDash([]);
  cx.fillStyle='#d93025';cx.font='bold 11px Share Tech Mono';cx.fillText('충격!',W-42,14);

  cx.fillStyle='#1a73e8';cx.fillRect(W-100,28,10,10);
  cx.fillStyle='#5f6368';cx.font='11px Share Tech Mono';cx.fillText('Y축',W-86,37);
  $('frozenGraphTime').textContent=Math.floor(last.length/SAMPLE_RATE)+'초';
}

function renderEvents(){
  if(!savedEvents.length){$('eventList').innerHTML='<div class="no-events">충격 이벤트가 감지되면 여기에 표시됩니다</div>';return}
  $('eventList').innerHTML=savedEvents.map((ev,i)=>`
    <div class="event-item">
      <span class="time">${ev.timeShort}</span>
      <span class="mag">${ev.magnitude}G</span>
      <span>${ev.duration}초</span>
      <button class="download-btn" onclick="downloadEvent(${i})">저장</button>
    </div>`).join('');
}

function downloadEvent(i){
  const ev=savedEvents[i];
  const d={event_time:ev.time,impact_g:+ev.magnitude,duration_sec:ev.duration,
    sample_rate:SAMPLE_RATE,points:ev.dataPoints,samples:ev.data.map(s=>({t:s.t,y:s.y,g:s.g}))};
  const b=new Blob([JSON.stringify(d,null,2)],{type:'application/json'});
  const u=URL.createObjectURL(b);const a=document.createElement('a');
  a.href=u;a.download=`impact_${ev.id}.json`;a.click();URL.revokeObjectURL(u);
  addLog(`이벤트 다운로드`,'save');
}

function clearEvents(){
  if(!confirm('모든 기록을 삭제하시겠습니까?'))return;
  savedEvents=[];$('savedCount').textContent='0';$('eventBadge').textContent='0';
  $('clearBtn').disabled=true;renderEvents();addLog('기록 삭제됨');
}

function drawGraph(){
  const c=$('graphCanvas'),cx=c.getContext('2d');
  const dpr=window.devicePixelRatio||1,rect=c.getBoundingClientRect();
  c.width=rect.width*dpr;c.height=rect.height*dpr;cx.scale(dpr,dpr);
  const W=rect.width,H=rect.height;cx.clearRect(0,0,W,H);

  cx.strokeStyle='#e8eaed';cx.lineWidth=.5;
  for(let y=0;y<H;y+=H/6){cx.beginPath();cx.moveTo(0,y);cx.lineTo(W,y);cx.stroke()}
  for(let x=0;x<W;x+=W/10){cx.beginPath();cx.moveTo(x,0);cx.lineTo(x,H);cx.stroke()}
  cx.strokeStyle='#d0d5dd';cx.lineWidth=1;
  cx.beginPath();cx.moveTo(0,H/2);cx.lineTo(W,H/2);cx.stroke();

  const mapV=v=>H/2-(v/20)*(H/2);

  // Brake zone
  cx.fillStyle='rgba(123,31,162,.04)';
  const bY=mapV(BRAKE_THRESHOLD);cx.fillRect(0,bY,W,H-bY);
  cx.strokeStyle='rgba(123,31,162,.2)';cx.lineWidth=1;cx.setLineDash([3,3]);
  cx.beginPath();cx.moveTo(0,bY);cx.lineTo(W,bY);cx.stroke();cx.setLineDash([]);

  cx.strokeStyle='#1a73e8';cx.lineWidth=2;cx.beginPath();
  for(let i=0;i<graphY.length;i++){
    const px=(i/(graphY.length-1))*W,py=mapV(graphY[i]);
    i===0?cx.moveTo(px,py):cx.lineTo(px,py);
  }
  cx.stroke();

  cx.font='10px Share Tech Mono';
  cx.fillStyle='#1a73e8';cx.fillRect(W-50,6,8,8);
  cx.fillStyle='#5f6368';cx.fillText('Y',W-38,14);

  animFrameId=requestAnimationFrame(drawGraph);
}

function stopRecording(){
  isRecording=false;
  window.removeEventListener('devicemotion',handleMotion);
  if(sampleInterval){clearInterval(sampleInterval);sampleInterval=null}
  if(animFrameId){cancelAnimationFrame(animFrameId);animFrameId=null}
}

async function toggleRecording(){
  if(!isRecording){
    if(typeof DeviceMotionEvent!=='undefined'&&typeof DeviceMotionEvent.requestPermission==='function'){
      try{const p=await DeviceMotionEvent.requestPermission();if(p!=='granted'){addLog('권한 거부');return}}
      catch(e){addLog('권한 실패');return}
    }
    isRecording=true;dataBuffer=[];graphY.fill(0);prevY=0;brakeActive=false;
    $('frozenGraphSection').classList.remove('visible');
    $('impactBanner').classList.remove('visible');
    $('yDisplay').classList.remove('braking');
    $('pedalSection').classList.remove('braking');
    pedalArm.style.transform='rotate(0deg)';
    brakeLight.setAttribute('fill','#ddd');
    window.addEventListener('devicemotion',handleMotion);
    startSampling();drawGraph();
    $('statusDot').className='status-dot active';$('statusText').textContent='기록 중';
    $('startBtn').textContent='정지';$('startBtn').classList.add('stop-btn');
    addLog('기록 시작 — Y축 + 페달 모니터');
  }else{
    stopRecording();
    $('statusDot').className='status-dot idle';$('statusText').textContent='수동 정지';
    $('startBtn').textContent='시작';$('startBtn').classList.remove('stop-btn');
    $('yDisplay').classList.remove('braking');$('pedalSection').classList.remove('braking');
    brakeActive=false;addLog('수동 정지');
  }
}

// Desktop sim
(function(){
  if(!('DeviceMotionEvent' in window)||/Windows|Macintosh/.test(navigator.userAgent)){
    addLog('데스크톱 — 시뮬레이션');
    let t=0;
    setInterval(()=>{
      if(!isRecording)return;t+=.05;
      curX=Math.sin(t*1.3)*.5+(Math.random()-.5)*.3;
      curY=Math.cos(t*.9)*3+(Math.random()-.5)*.5; // 더 큰 Y 변동으로 페달 동작 확인
      curZ=9.81+Math.sin(t*.7)*.3+(Math.random()-.5)*.2;
    },50);
  }
})();

addLog('초기화 완료');addLog('"시작" 버튼으로 기록 시작');
drawGraph();
</script>
